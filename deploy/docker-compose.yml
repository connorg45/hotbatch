name: hotbatch

services:
  hotbatch:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    environment:
      HF_HOME: /home/hotbatch/.cache/huggingface
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      RUST_LOG: info
    volumes:
      - hotbatch-hf-cache:/home/hotbatch/.cache/huggingface
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      hotbatch:
        condition: service_healthy

volumes:
  hotbatch-hf-cache:
