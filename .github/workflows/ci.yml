name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: fmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: tests
        run: cargo test --release --all
      - name: bench smoke
        run: HOTBATCH_BENCH_SMOKE=1 cargo run --release --bin hotbatch-bench
