name: ci

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@c1709d61444fb708e6ed87924f95626398d8d115 # 1.89.0
        with:
          components: clippy, rustfmt
      - name: fmt
        timeout-minutes: 5
        run: cargo fmt --all --check
      - name: clippy
        timeout-minutes: 30
        run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - name: tests
        timeout-minutes: 30
        run: cargo test --locked --release --all
      - name: bench smoke
        timeout-minutes: 10
        run: cargo run --locked --release --bin hotbatch-bench -- --smoke --model tiny-gpt2 --output-dir target/bench-smoke
